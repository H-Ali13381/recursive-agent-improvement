# Optuna search-space skeleton.
# Keep thorough mode small. Tune only high-impact parameters.

study:
  name: null
  direction: minimize
  storage: artifacts/optuna/study.db
  load_if_exists: true
  n_trials: 20
  seed: 42

objective:
  type: minimax  # minimax preferred for cross-task robustness
  formula: "1 - min(per_task_scores)"

pruning:
  enabled: true
  n_startup_trials: 3
  n_warmup_steps: 2

parameters:
